name: poll

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write   # for the commit-daily-report step

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - id: date
        run: echo "today=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g @anthropic-ai/claude-code

      - name: Restore seen-state cache
        uses: actions/cache@v4
        with:
          path: data/
          key: seen-${{ steps.date.outputs.today }}-${{ github.run_id }}
          restore-keys: |
            seen-${{ steps.date.outputs.today }}-

      - name: Run pipeline
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m src.main

      - name: Commit daily report back to repo
        if: success()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # daily-report-*.json is .gitignored; force-add only the files this run produced.
          # find handles the no-match case without erroring.
          find qc -name 'daily-report-*.json' -exec git add -f {} + 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no daily-report changes to commit"
            exit 0
          fi
          git commit -m "chore(qc): daily report $(date -u +%F) [skip ci]"
          # Rebase on top of any concurrent main updates before pushing
          git pull --rebase origin main
          git push

      - name: Upload QC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qc-${{ github.run_id }}
          path: |
            qc/daily-report-*.json
            data/processed-log.ndjson
          if-no-files-found: ignore
          retention-days: 7
