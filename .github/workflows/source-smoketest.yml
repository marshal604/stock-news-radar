name: source-smoketest

# Manual smoke test for individual news sources. Runs scripts/source_smoketest.py
# which fetches real items + tries body extraction without touching Discord or
# LLM quota. Use to validate new source adapters end-to-end before flipping
# them on for the live poll cron.

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Source to test (all/edgar/finviz/competitor_finviz/google_news/pr_newswire/finnhub_news)"
        required: true
        default: "finnhub_news"
        type: choice
        options:
          - all
          - edgar
          - finviz
          - competitor_finviz
          - google_news
          - pr_newswire
          - finnhub_news
      ticker:
        description: "Ticker symbol (must exist in tickers.json)"
        required: true
        default: "UUUU"
        type: string
      max_items:
        description: "Items to body-fetch per source"
        required: true
        default: "3"
        type: string

permissions:
  contents: read

jobs:
  smoketest:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke test
        env:
          FINNHUB_API_KEY_RAW: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          export FINNHUB_API_KEY="$(printf '%s' "$FINNHUB_API_KEY_RAW" | tr -d '[:space:]')"
          python scripts/source_smoketest.py \
            --source "${{ inputs.source }}" \
            --ticker "${{ inputs.ticker }}" \
            --max-items "${{ inputs.max_items }}"
